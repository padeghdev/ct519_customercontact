{% extends "base.html" %}


{% block namemenu %}
<h1 class="m-0">Show Customer</h1>
{% endblock %}



{% block content %}
 
 <div class="card card-primary card-outline"> 

<div class="card-body"> 

       <div class="mb-3">

<table class="table table-hover"  style="text-align: center ; border:  1px solid #000 ;">


   <tr style="background-color: blue ; color: #fff ; height: 30px;">
            <th style="width: 100px; border:  1px solid #000 ;"   >ID</th>
            <th style="width: 300px; border:  1px solid #000 ;" >ชื่อองค์กรลูกค้า</th>
            <th style="width: 100px; border:  1px solid #000 ;" >เลขประจำตัวผู้เสียภาษี</th>

            <th style="width: 350px; border:  1px solid #000 ;"  >เบอร์โทร</th>
 
   </tr>



    {% for row in rows %}
      <tr  >
 
      <td style="text-align: center ; border:  1px solid #000 ;"  >{{ row[0] }}</td>
      <td style="text-align: left ; border:  1px solid #000 ;"  >{{ row[1] }}</td>
       <td style="text-align: center ; border:  1px solid #000 ;"  >{{ row[2] }}</td>
       <td style="text-align: left ; border:  1px solid #000 ;"  >{{ row[3] }}</td>
       <td style="text-align: center ; border:  1px solid #000 ;"  >{{ row[4] }}</td>
 
      </tr>
   {% endfor %}

</table>

 
</div>
</div>

</div>

{% endblock %}
