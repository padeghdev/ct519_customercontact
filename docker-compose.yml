services:
  # 1. Flask Application
  web:
    build: .
    container_name: flask_app
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@dbpg:5432/mydatabase
    depends_on:
      - dbpg
    networks:
      - web_network
      - db_network

    

  # 2. PostgreSQL Database
  dbpg:
    image: postgres:15
    ports:
      - "5432:5432"
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - .backup.sql:/docker-entrypoint-initdb.d/backup.sql
    networks:
      - db_network


  # 3. pgAdmin
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "5055:80"
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    depends_on:
      - dbpg
    volumes:
      - ./pgadmin:/var/lib/pgadmin
    networks:
      - web_network  # เพื่อให้เราเข้าถึง pgAdmin จากหน้าเว็บนอกตู้ได้
      - db_network   # เพื่อให้ pgAdmin คุยกับ dbpg ได้



# กำหนดค่าระบบเครือข่าย (Networks) และพื้นที่เก็บข้อมูล (Volumes)
# -------------------------------------------------------------
networks:
  web_network:
    driver: bridge  # เครือข่ายภายนอกที่ให้ภายนอกเชื่อมเข้ามาหา Flask / pgAdmin ได้
  db_network:
    internal: true  # ปลอดภัยสูง! เครือข่ายภายใน ห้ามอินเทอร์เน็ตภายนอกวิ่งเข้ามาหา DB โดยตรง

volumes:
  pgdata:
  pgadmin: